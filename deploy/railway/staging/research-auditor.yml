# Railway: staging target for research-auditor (manual / preview workflows).
# Schema matches production files — consumed by deploy.yml and smoke-test.yml.

railway:
  project_name: "2026-software-lab"
  service_name: "research-auditor-staging"
  environment_name: "staging"

image:
  registry: "ghcr.io"
  repository: "{{ github_repository_owner }}/research-auditor"

runtime:
  start_command: "bash -c 'cd /app && uv sync --frozen && exec uv run --frozen python -m app.entrypoints.http'"

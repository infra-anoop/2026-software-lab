# Railway: second target for manual / future preview workflows.
# Schema must match production.yml — consumed by .github/workflows/deploy.yml and smoke-test.yml.
# Master pipeline (ci-cd-pipeline.yml) uses production only; run deploy.yml with environment=staging manually if needed.

railway:
  project_name: "2026-software-lab"
  service_name: "research-auditor-staging"
  environment_name: "staging"

image:
  registry: "ghcr.io"
  repository: "{{ github_repository_owner }}/research-auditor"

runtime:
  start_command: "bash -c 'cd /app && uv sync --frozen && exec uv run --frozen python -m app.entrypoints.http'"

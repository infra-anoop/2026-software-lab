# ------------------------------------------------------------------------------
# Reusable: Ship one app container to GHCR
# ------------------------------------------------------------------------------
# Builds `nix build .#<nix_attr>` (e.g. container-research-auditor), loads into
# Docker, tags ghcr.io/<owner>/<image_name>, pushes.
# Callers supply matrix inputs from apps/registry.json (see ci-cd-pipeline.yml).
# ------------------------------------------------------------------------------

name: "Ship Container to GHCR"

on:
  workflow_call:
    inputs:
      app_id:
        description: "Registry application id (for logs)"
        required: true
        type: string
      nix_attr:
        description: "Flake attribute (e.g. container-research-auditor)"
        required: true
        type: string
      image_name:
        description: "Docker/OCI image basename (matches oci.image_name)"
        required: true
        type: string

  workflow_dispatch:
    inputs:
      app_id:
        description: "Application id (see apps/registry.json)"
        required: true
        type: string
      nix_attr:
        description: "Flake attribute (e.g. container-smart-writer)"
        required: true
        type: string
      image_name:
        description: "Image basename after docker load"
        required: true
        type: string

concurrency:
  group: ship-${{ github.ref }}-${{ inputs.app_id }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          extra_nix_config: |
            sandbox = false

      - name: Build container with Nix
        run: nix build ".#${{ inputs.nix_attr }}"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load, tag, and push
        shell: bash
        env:
          APP_ID: ${{ inputs.app_id }}
          NIX_ATTR: ${{ inputs.nix_attr }}
          IMAGE_NAME: ${{ inputs.image_name }}
        run: |
          set -euo pipefail

          docker load < result

          OWNER="${{ github.repository_owner }}"
          IMAGE="ghcr.io/${OWNER}/${IMAGE_NAME}"

          REF="${{ github.ref_name }}"
          SHORT_SHA="$(echo "${{ github.sha }}" | cut -c1-7)"

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="$REF"
          else
            TAG="branch-$REF"
          fi

          echo "Shipping ${APP_ID} (${NIX_ATTR}) → ${IMAGE}"

          docker tag "${IMAGE_NAME}:latest" "${IMAGE}:${TAG}"
          docker tag "${IMAGE_NAME}:latest" "${IMAGE}:sha-${SHORT_SHA}"

          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:sha-${SHORT_SHA}"

          docker tag "${IMAGE_NAME}:latest" "${IMAGE}:latest"
          docker push "${IMAGE}:latest"
